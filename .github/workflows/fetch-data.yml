name: 주가 데이터 자동 업데이트

on:
  schedule:
    - cron: '0 * * * 1-5'
    - cron: '0 9 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '수집 모드 (daily=전체풀, hourly=관심종목, quarterly=분기재무)'
        required: false
        default: 'daily'
        type: choice
        options:
          - daily
          - hourly
          - quarterly

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests pandas

      - name: 수집 모드 결정
        id: mode
        run: |
          HOUR=$(date -u +%H)
          MINUTE=$(date -u +%M)
          EVENT="${{ github.event_name }}"
          INPUT_MODE="${{ github.event.inputs.mode }}"

          if [ "$EVENT" = "workflow_dispatch" ] && [ "$INPUT_MODE" = "quarterly" ]; then
            echo "mode=quarterly" >> $GITHUB_OUTPUT
          elif [ "$EVENT" = "workflow_dispatch" ] && [ "$INPUT_MODE" = "daily" ]; then
            echo "mode=daily" >> $GITHUB_OUTPUT
          elif [ "$MINUTE" = "00" ] && [ "$HOUR" = "09" ]; then
            echo "mode=daily" >> $GITHUB_OUTPUT
          else
            echo "mode=hourly" >> $GITHUB_OUTPUT
          fi

      - name: 데이터 수집
        env:
          COLLECT_MODE: ${{ steps.mode.outputs.mode }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python scripts/fetch_yahoo.py

      - name: 변경사항 커밋
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add public/data/
          git diff --staged --quiet || git commit -m "📊 주가 업데이트: $(date '+%Y-%m-%d %H:%M') (${{ steps.mode.outputs.mode }})"
          git push
