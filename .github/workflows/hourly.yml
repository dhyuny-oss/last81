name: 주가 데이터 자동 업데이트
on:
  schedule:
    - cron: '0 0-6 * * 1-5'   # UTC 0~6 = KST 9~15 (한국 장중 매시간)
    - cron: '0 14-20 * * 1-5'  # UTC 14~20 = KST 23~05 (미국 장중 매시간)
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      COLLECT_MODE: hourly
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      KIS_ACCOUNT: ${{ secrets.KIS_ACCOUNT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Fetch price data
        run: python scripts/fetch_yahoo.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/stocks.json
          git diff --staged --quiet || (
            git commit -m "⏰ $(date +%H:%M) 현재가 업데이트"
            git pull --rebase origin main
            git push
          )
