name: Daily Data Update
on:
  schedule:
    - cron: '0 7 * * 1-5'   # UTC 07:00 = KST 16:00 (한국 장마감 후)
    - cron: '30 21 * * 1-5'  # UTC 21:30 = KST 06:30 (미국 장마감 후)
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      COLLECT_MODE: daily
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      KIS_ACCOUNT: ${{ secrets.KIS_ACCOUNT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Fetch market data
        run: python scripts/fetch_yahoo.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/stocks.json public/data/alpha_hits.json
          git diff --staged --quiet || (
            git commit -m "📊 $(date +%Y-%m-%d) 데이터 업데이트"
            git pull --rebase origin main
            git push
          )
