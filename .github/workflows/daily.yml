name: Daily Data Update
on:
  schedule:
    - cron: '0 22 * * 1-5'  # UTC 22:00 = KST 07:00 (미국 장마감 후 + 한국 전일 확정)
  workflow_dispatch:          # 수동 실행 가능

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      COLLECT_MODE: daily
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Fetch market data
        run: python scripts/fetch_yahoo.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/stocks.json public/data/alpha_hits.json
          git diff --staged --quiet || git commit -m "📊 $(date +%Y-%m-%d) 데이터 업데이트"
          git push
